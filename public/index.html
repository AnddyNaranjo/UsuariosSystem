<!DOCTYPE html>
<html class="container-fluid">
<!-- Bootstrap en todas las páginas -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<head>
    <title>Mi App</title>
</head>

<body>
    <div class="row">

        <div class="col">

        </div>

        <div class="col">
           <div class="card text-center">
            <div class="card-header mb-3">
                <label>Bienvenido</label>
            </div>
             <form id="loginForm">
            <div class="card-body">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="usuario" placeholder="name@example.com">
                <label for="usuario">Usuario</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password">
                <label for="password">Contraseña</label>
            </div>
            </div>
            <div class="card-footer">
                <button type="submit" class="btn btn-outline-success">Iniciar Sesion</button>
                <button type="button" class="btn btn-outline-danger">Registrarse</button>
            </div>
            </form>
            </div>
        </div>

        <div class="col">

        </div>
    </div>

    </div>
</body>

</html>
