
<html>
  <head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

  </head>

  <body class="container-fluid">
<div class="mb-3">
  <nav class="navbar sticky-top bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Listado de Productos</a>
    <form class="d-flex justify-content-start">
    <button class="btn btn-outline-success me-2" type="button" data-bs-toggle="modal" data-bs-target="#registrarProducto">
      Nuevo Producto
    </button>
    <button class="btn btn-outline-secondary" type="button">Registrar Usuario</button>
  </form>
  </div>
</nav>
</div>

    <div class="row">
      <div class="col">
        <div class="table-responsive">
          <table class="table table-dark table-striped table-bordered align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Descripción</th>
                <th>Imagen</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaProductos">
              <!-- Filas dinámicas -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- MODAL MODIFICAR PRODUCTO -->
<div class="modal fade" id="modalProducto" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Modificar Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editId">

        <div class="mb-2">
          <input type="text" id="editNombre" class="form-control" placeholder="Nombre">
        </div>

        <div class="mb-2">
          <input type="number" step="0.01" id="editPrecio" class="form-control" placeholder="Precio">
        </div>

        <div class="mb-2">
          <input type="number" id="editStock" class="form-control" placeholder="Stock">
        </div>

        <div class="mb-2">
          <input type="text" id="editDescripcion" class="form-control" placeholder="Descripción">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-success" onclick="guardarCambios()">Guardar</button>
      </div>

    </div>
  </div>
</div>



<!-- Modal Registro de Productos-->
<div class="modal fade" id="registrarProducto" tabindex="-1" aria-labelledby="registrarProductoLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="registrarProductoLabel">Registrar Producto</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="productoForm" enctype="multipart/form-data" class="g-2">
      <div class="modal-body">
      <div class="mb-3">
        <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
      </div>
      <div class="row">
      <div class="col mb-3">
        <input type="number" step="0.01" id="precio" class="form-control" placeholder="Precio" required>
      </div>
      <div class="col mb-3">
        <input type="number" id="stock" class="form-control" placeholder="Stock" required>
      </div>
      </div>
      <div class="mb-3">
        <input type="text" id="descripcion" class="form-control" placeholder="Descripción">
      </div>
      <div class="mb-3">
        <input type="file" id="imagen" class="form-control" accept="image/*" required>
      </div>
    
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-success" >Guardar Producto</button>
      </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS al final -->
    <script src="js/productos.js"></script>
  </body>
</html>
