<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <h1></h1>
</head>

<body class="container-fluid">
    <div class="row">
        <div class="col"></div>
        <div class="col">
            <form id="registerForm">
                <div class="card text-center">
                    <div class="card-header">
                        <h5>Registro de Usuario</h5>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="ana" />
                        <div class="invalid-feedback"></div>
                        <label for="nombre">Nombre</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="usuario" name="usuario" placeholder="anicita" />
                        <div class="invalid-feedback"></div>
                        <label for="usuario">Usuario</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" />
                        <div class="invalid-feedback"></div>
                        <label for="email">Correo Electronico</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" />
                        <div class="invalid-feedback"></div>
                        <label for="password">Contraseña</label>
                    </div>

                    <div class="mb-3">
                        <select class="form-select" aria-label="Default select example" id="rol" name="rol">
                            <option value="" selected disabled>
                                Seleccionar Rol del usuario
                            </option>
                            <option value="usuario">Usuario</option>
                            <option value="admin">Administrador</option>
                        </select>

                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="card-footer">
                        <button type="submit" class="btn btn-outline-info">
                            Registrar Usuario
                        </button>
                        <button type="reset" class="btn btn-outline-danger" onclick="window.location.href = '/menu'">
                            Cancelar Registro
                        </button>
                    </div>
                </div>
            </form>
        </div>
        <div class="col"></div>
    </div>
</body>

</html>

<script src="js/register.js"></script>
